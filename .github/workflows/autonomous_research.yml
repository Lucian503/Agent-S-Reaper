name: Autonomous Agent-S Researcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xclip xsel libpng-dev libjpeg-dev python3-tk python3-dev xvfb tesseract-ocr tesseract-ocr-eng libtesseract-dev libgbm1 libasound2

      - name: Install Agent-S Requirements
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run Agent-S Headless
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          HEADLESS: "true"
          USE_PLAYWRIGHT: "true"
          DISPLAY: :99
        run: |
          mkdir -p logs
          chmod +x run_s3_gemini_macos.sh
          /usr/bin/xvfb-run --server-args="-screen 0 1280x1024x24" ./run_s3_gemini_macos.sh --task "Search GitHub for tools to improve my data scraping accuracy. Record what you learn in SKILLS.md and save gathered data to results.csv."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Agent-S-Bot"
          git config --global user.email "agent@github.com"
          git add SKILLS.md results.csv research_log.md logs/ requirements.txt || echo "No files to add"
          git commit -m "Autonomous Update: Final Environment Sync" || echo "No changes"
          git push
