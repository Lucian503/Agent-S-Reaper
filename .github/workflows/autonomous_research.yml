name: Autonomous Agent-S Researcher
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox wmctrl xdotool gnome-screenshot scrot chromium-browser

      - name: Install Python Deps
        run: |
          pip install openai Pillow -r requirements.txt

      - name: Run Agent with Watchdog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISPLAY: :99
        run: |
          mkdir -p logs
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 3
          fluxbox &
          sleep 2
          # Run agent and pipe ALL output to log
          chmod +x run_s3_gemini_macos.sh
          ./run_s3_gemini_macos.sh > logs/agent.log 2>&1 || echo "Agent Crashed"

      - name: Self-Heal on Failure
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python healer.py
