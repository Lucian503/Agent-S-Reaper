name: Autonomous Agent-S Researcher

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox wmctrl xdotool gnome-screenshot scrot chromium-browser

      - name: Install Python Deps
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Adding common agent deps just in case they aren't in your requirements
          pip install openai playwright pyautogui
          python -m playwright install chromium

      - name: Run Agent with Virtual Display
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          fluxbox &
          sleep 2
          python healer.py

      - name: Commit and Push Changes
        if: always()
        run: |
          git config --global user.name "Agent-S-Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "Auto-update: Knowledge Base & Repairs" || echo "No changes to commit"
          git push
