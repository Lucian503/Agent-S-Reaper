name: Autonomous Agent-S Researcher

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fluxbox wmctrl xdotool gnome-screenshot scrot chromium-browser

      - name: Install Python Deps
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Adding common agent deps just in case they aren't in your requirements
          pip install openai playwright pyautogui
          python -m playwright install chromium

      - name: Run Agent with Virtual Display
        id: run_agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          fluxbox &
          sleep 2
          python healer.py

      - name: Commit and Push Changes
        id: auto_commit
        if: always()
        run: |
          set -euo pipefail
          git config --global user.name "Agent-S-Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "changes_pushed=false" >> "$GITHUB_OUTPUT"
            echo "changes_summary=No repository changes were produced this run." >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Knowledge Base & Repairs"
            git push
            echo "changes_pushed=true" >> "$GITHUB_OUTPUT"
            echo "changes_summary=Changes were committed and pushed by Agent-S-Bot." >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Plain-Language CHECK IN Summary
        if: always()
        env:
          AGENT_RUN_OUTCOME: ${{ steps.run_agent.outcome }}
          CHANGES_SUMMARY: ${{ steps.auto_commit.outputs.changes_summary }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RUN_TIME_UTC="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## CHECK IN (Cloud Agent-S)
          **Run time:** ${RUN_TIME_UTC}
          **Trigger:** ${EVENT_NAME}

          ### 1) Capability Status
          - Cloud research, code updates, and maintenance in this repository: READY
          - Desktop data collection from your Mac: BLOCKED
          - Access to private programs from this cloud runner: PARTIAL
          - CoverMyMeds prior authorization draft support: PARTIAL
          - CoverMyMeds final submission from cloud runner: BLOCKED

          ### 2) This Run
          - Agent execution result: ${AGENT_RUN_OUTCOME}
          - Repository change result: ${CHANGES_SUMMARY}

          ### 3) Healthcare Workflow Readiness
          - When prompted with approved patient and payer data, Agent-S can prepare prior auth content and workflow notes.
          - This cloud job cannot use your local desktop files, local browser state, or local authenticated sessions.
          - Final healthcare submission should happen only after explicit human confirmation.

          ### 4) Next Best Action
          - Keep this workflow for cloud maintenance and run a local Agent-S worker on your Mac for desktop collection and live portal actions.
          EOF
